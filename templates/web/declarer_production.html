{% extends 'base.html' %}
{% block title %}Déclarer une production{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <h2 class="mb-4">🌱 Déclarer une production</h2>
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="post" action="{% url 'declarer_production' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nom de la culture</label>
                        <input type="text" name="nom" class="form-control"
                               placeholder="Ex : Tomate" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Type de culture</label>
                        <input type="text" name="type_culture" class="form-control"
                               placeholder="Ex : Maraîchage" required>
                    </div>
                    <div class="row">
                        <div class="col mb-3">
                            <label class="form-label">Quantité</label>
                            <input type="number" step="0.01" name="quantite"
                                   class="form-control" required>
                        </div>
                        <div class="col mb-3">
                            <label class="form-label">Unité</label>
                            <input type="text" name="unite" class="form-control"
                                   value="kg" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date de récolte</label>
                        <input type="date" name="date_recolte" class="form-control">
                    </div>
                    <div class="alert alert-info small">
                        Votre production sera examinée par un administrateur avant
                        d'être publiée au catalogue.
                    </div>
                    <button type="submit" class="btn btn-success w-100">Déclarer</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
